version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fragmentfi-app
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/public/stats']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - 'com.fragmentfi.project=fragmentfi-stellar'
      - 'com.fragmentfi.service=nextjs-app'
      - 'com.fragmentfi.environment=production'
      - 'traefik.enable=false'
